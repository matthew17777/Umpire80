<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎂 Happy 80th Birthday, Boyd!</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

    <div class="glass-card">

        <!-- ========================================================= -->
        <!-- FIRST SCREEN -->
        <!-- ========================================================= -->

        <section id="screen1">

            <h1>
                Happy 80th Birthday,<br>
                <span class="boyd">Boyd!</span>
            </h1>

            <p class="subtitle">
                Thousands of games • One legendary umpire
            </p>

            <button id="cakeButton" aria-label="Birthday Cake">
                🎂
            </button>

            <p id="instruction">
                Hold the cake.
            </p>

        </section>



        <!-- ========================================================= -->
        <!-- SECOND SCREEN -->
        <!-- (Hidden until the confetti finishes) -->
        <!-- ========================================================= -->

        <section id="screen2" class="hidden">

            <div id="messageContainer">

                <h2 id="messageTitle">
                    🥳 THANK YOU!
                </h2>

                <p id="messageText">

                    Your birthday wishes
                    made Boyd's day.

                </p>

            </div>

            <a

                id="petitionButton"

                href="https://YOUR-CHANGE-ORG-LINK-HERE"

                target="_blank"

            >

                ⚾ Keep Boyd on the Field

            </a>

        </section>

    </div>

    <script src="js/main.js"></script>

</body>

</html>
